# Copy to your service, fill in, then sops-encrypt.
# Schema: a_solutions/_shared/secrets-schema.md

EXAMPLE_ADMIN_PASSWORD: 'REPLACE_WITH_HASH_OR_PLAINTEXT'
EXAMPLE_DB_PASSWORD: 'REPLACE_WITH_PLAINTEXT'
EXAMPLE_API_TOKEN: 'REPLACE_WITH_TOKEN'

# Human-reference metadata — engines filter _-prefix top-level keys; never reaches VM
_credentials:
  admin:
    type: password
    url: https://REPLACE_ME/admin
    username: admin
    password: REPLACE_WITH_PLAINTEXT
    hashed: 'REPLACE_WITH_HASH_OR_OMIT'
    note: "pairs with EXAMPLE_ADMIN_PASSWORD"
  db:
    type: db
    username: REPLACE_ME
    password: REPLACE_WITH_PLAINTEXT
    database: REPLACE_ME
    note: "pairs with EXAMPLE_DB_PASSWORD"
  api:
    type: apikey
    url: https://api.example.com
    token: REPLACE_WITH_TOKEN
    note: "pairs with EXAMPLE_API_TOKEN"

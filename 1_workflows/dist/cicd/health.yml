name: Health Reports

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      report:
        description: "Report to run (all, cloud, mail, url, stack)"
        required: false
        default: "all"

concurrency:
  group: health-reports
  cancel-in-progress: true

jobs:
  health:
    name: "Run health reports"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      WG_PRIVATE_KEY: ${{ secrets.WG_PRIVATE_KEY }}
      OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
      GCP_PROXY_SSH_KEY: ${{ secrets.GCP_PROXY_SSH_KEY }}
      GCP_T4_SSH_KEY: ${{ secrets.GCP_T4_SSH_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v4

      - name: Run reports
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker pull ghcr.io/diegonmarcos/cloud-data-reports:latest
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$OCI_SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
          mkdir -p ~/.config/sops/age
          echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
          REPORT="${{ github.event.inputs.report || 'all' }}"
          # docker-compose.yml mounts $HOME/git/cloud-data → /root/git/cloud-data.
          # On GHA runners the checkout lives at $GITHUB_WORKSPACE, not $HOME/git/cloud-data.
          # Symlink so the compose volume binds to the real checkout.
          mkdir -p "$HOME/git"
          [ -e "$HOME/git/cloud-data" ] || ln -sfn "$GITHUB_WORKSPACE" "$HOME/git/cloud-data"
          cd reports
          docker compose run --rm reports "$REPORT"

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A reports/
          if ! git diff --cached --quiet; then
            git commit -m "auto: health reports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

name: Health Reports

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      report:
        description: "Report to run (all, cloud, mail, url, stack)"
        required: false
        default: "all"

concurrency:
  group: health-reports
  cancel-in-progress: true

jobs:
  health:
    name: "Run health reports"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
      WG_PRIVATE_KEY: ${{ secrets.WG_PRIVATE_KEY }}
      OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
      GCP_PROXY_SSH_KEY: ${{ secrets.GCP_PROXY_SSH_KEY }}
      GCP_T4_SSH_KEY: ${{ secrets.GCP_T4_SSH_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: cloud-data

      # Reports binaries read _cloud-data-consolidated.json + build-reports.json
      # from cloud/2_configs/dist/. Sparse-checkout that directory only.
      # Cone mode is the default (and the only mode that reliably populates a
      # subdirectory) — non-cone mode treats the pattern as gitignore syntax,
      # which silently empties the dir when the pattern doesn't match files.
      - uses: actions/checkout@v4
        with:
          repository: diegonmarcos/cloud
          path: cloud
          sparse-checkout: |
            2_configs/dist

      - name: Run reports
        env:
          REPORT: ${{ github.event.inputs.report || 'all' }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker pull ghcr.io/diegonmarcos/cloud-data-reports:latest
          # docker-compose.yml mounts $HOME/git/{cloud-data,cloud} → /root/git/{cloud-data,cloud}.
          # On GHA the two checkouts live under $GITHUB_WORKSPACE/{cloud-data,cloud}.
          # Symlink so compose volumes bind to the real checkouts.
          mkdir -p "$HOME/git" "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          ln -sfn "$GITHUB_WORKSPACE/cloud-data" "$HOME/git/cloud-data"
          ln -sfn "$GITHUB_WORKSPACE/cloud"      "$HOME/git/cloud"
          # Sanity-check the cloud/ sparse-checkout (failures here are silent
          # in actions/checkout — confirm the data files actually arrived).
          echo "::group::cloud/2_configs/dist/ sanity check"
          if [ -f "$HOME/git/cloud/2_configs/dist/_cloud-data-consolidated.json" ]; then
            echo "OK: _cloud-data-consolidated.json present ($(stat -c%s "$HOME/git/cloud/2_configs/dist/_cloud-data-consolidated.json") bytes)"
          else
            echo "::error::_cloud-data-consolidated.json missing — sparse-checkout failed"
            ls -la "$HOME/git/cloud/2_configs/dist/" 2>&1 || true
          fi
          echo "::endgroup::"
          # SOPS age key — entrypoint reads from this mount.
          mkdir -p "$HOME/.config/sops/age"
          printf '%s' "$SOPS_AGE_KEY" > "$HOME/.config/sops/age/keys.txt"
          # Per-VM SSH keys are passed through env vars; entrypoint materialises
          # them and emits ~/.ssh/config from _cloud-data-consolidated.json.
          cd cloud-data/reports
          docker compose run --rm reports "$REPORT"

      - name: Commit and push reports
        working-directory: cloud-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A reports/
          if git diff --cached --quiet; then
            echo "No report changes to push"
            exit 0
          fi
          git commit -m "auto: health reports $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Race-safe push: user + other workflows push in parallel to this ref.
          for i in 1 2 3; do
            git push && exit 0
            echo "Push attempt $i failed — rebasing and retrying..."
            git pull --rebase origin main || true
          done
          echo "::error::Failed to push after 3 retries"
          exit 1

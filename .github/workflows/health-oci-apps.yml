name: "Health → oci-apps"

on:
  workflow_run:
    workflows: ["Ship → oci-apps"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: health-oci-apps
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.OCI_SSH_KEY }}
          ssh_host: 82.70.229.129
          ssh_user: ubuntu
          ssh_alias: oci-apps
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        run: bash .github/workflows/scripts/health-check-vm.sh oci-apps 3100,3101,3102,3103,8065,8081

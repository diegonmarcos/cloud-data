# ┌──────────────────────────────────────────────────────────────┐
# │  DO NOT EDIT — this file is generated/deployed by the engine  │
# │                                                                │
# │  Source: cloud/workflows/src/  (templates + static)            │
# │  Build:  ./build.sh workflow   (generates → workflows/dist/)   │
# │  Deploy: copies dist/ → .github/workflows/                    │
# │                                                                │
# │  Edit the source, run build.sh workflow, then commit.          │
# └──────────────────────────────────────────────────────────────┘

name: "Ship → oci-analytics"

on:
  push:
    paths:
      - "a_solutions/bc-obs_alerts-api/src/**"
      - "a_solutions/bc-obs_dozzle/src/**"
      - "a_solutions/bc-obs_fluent-bit/src/**"
      - "a_solutions/bc-obs_matomo/src/**"
      - "a_solutions/bc-obs_sauron-forwarder/src/**"
      - "a_solutions/bc-obs_umami/src/**"
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ship-oci-analytics
  cancel-in-progress: false

jobs:
  ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Ship inside cloud-builder
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/diegonmarcos/cloud-builder-x86-nixos:latest
          mkdir -p "${{ runner.temp }}/traces"
          docker run --rm \
            -v "${{ runner.temp }}/traces:/traces" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e TRACE_DIR=/traces \
            -e SSH_KEY='${{ secrets.OCI_SSH_KEY }}' \
            -e SSH_HOST='129.151.228.66' \
            -e SSH_USER='ubuntu' \
            -e SSH_ALIAS='oci-analytics' \
            -e SOPS_AGE_KEY='${{ secrets.SOPS_AGE_KEY }}' \
            -e GITHUB_TOKEN='${{ secrets.GITHUB_TOKEN }}' \
            -e GITHUB_ACTOR='${{ github.actor }}' \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME="${GITHUB_EVENT_NAME:-}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e FORCE_DEPLOY=1 \
            ghcr.io/diegonmarcos/cloud-builder-x86-nixos:latest \
            bash -c 'mkdir -p ~/.ssh && ssh-keyscan github.com >>~/.ssh/known_hosts 2>/dev/null && git clone --depth 2 --recurse-submodules https://github.com/$GITHUB_REPOSITORY.git /workspace && cd /workspace && git submodule update --remote && stdbuf -oL bash .github/workflows/scripts/cloud-builder.sh ship $SSH_ALIAS 2>&1 | stdbuf -oL cat'

      - name: Push traces to cloud-data
        if: always()
        continue-on-error: true
        run: |
          TRACE_FILE="${{ runner.temp }}/traces/oci-analytics.json"
          [ -f "$TRACE_FILE" ] || { echo "No trace file produced"; exit 0; }
          # Setup SSH for cloud-data repo
          mkdir -p ~/.ssh
          echo '${{ secrets.CLOUD_DATA_DEPLOY_KEY }}' > ~/.ssh/cloud_data_key
          chmod 600 ~/.ssh/cloud_data_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/cloud_data_key -o StrictHostKeyChecking=no"
          # Clone cloud-data, merge trace, push
          git clone --depth 1 git@github.com:diegonmarcos/cloud-data.git /tmp/cloud-data
          cd /tmp/cloud-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p traces-gha
          TARGET="traces-gha/oci-analytics.json"
          if [ -f "$TARGET" ]; then
            jq --slurpfile new "$TRACE_FILE" '. + $new | .[-200:]' "$TARGET" > "${TARGET}.tmp" \
              && mv "${TARGET}.tmp" "$TARGET"
          else
            jq -s '.' "$TRACE_FILE" > "$TARGET"
          fi
          git add traces-gha/
          git diff --cached --quiet && { echo "No trace changes"; exit 0; }
          git commit -m "auto: trace ship-oci-analytics [skip ci]"
          for i in 1 2 3; do
            git push origin main && break
            echo "Push attempt $i failed — pulling and retrying..."
            git pull --rebase origin main 2>/dev/null || true
          done

name: "Health → gcp-t4"

on:
  workflow_run:
    workflows: ["Ship → gcp-t4"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: health-gcp-t4
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.GCP_T4_SSH_KEY }}
          ssh_host: ${{ secrets.GCP_T4_HOST }}
          ssh_user: ${{ secrets.GCP_T4_USER }}
          ssh_alias: gcp-t4
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        run: bash .github/workflows/scripts/health-check-vm.sh gcp-t4 3000

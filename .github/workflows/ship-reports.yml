name: "Ship → Reports image"

on:
  push:
    paths:
      - "reports/*/src/**"
      - "reports/*/Cargo.toml"
      - "reports/Cargo.toml"
      - "reports/Dockerfile"
      - "reports/cloud-sec-data-report/yara-rules/**"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build + push reports image"
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}
    steps:
      - name: Ship via cloud-builder
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          IMAGE="ghcr.io/diegonmarcos/cloud-builder-x-deb-nixhm:latest"
          docker pull "$IMAGE"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e GITHUB_TOKEN \
            -e GITHUB_ACTOR \
            "$IMAGE" ship-reports

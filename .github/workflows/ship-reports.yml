name: "Ship → Reports image"

on:
  push:
    paths:
      - "reports/*/src/**"
      - "reports/*/Cargo.toml"
      - "reports/Cargo.toml"
      - "reports/Dockerfile"
      - "reports/cloud-sec-data-report/yara-rules/**"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build + push reports image"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        run: |
          cd reports
          docker build \
            --network=host \
            -t ghcr.io/diegonmarcos/cloud-data-reports:latest \
            -t ghcr.io/diegonmarcos/cloud-data-reports:${{ github.sha }} \
            .
          docker push ghcr.io/diegonmarcos/cloud-data-reports:latest
          docker push ghcr.io/diegonmarcos/cloud-data-reports:${{ github.sha }}

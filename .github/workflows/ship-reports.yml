name: "Ship → Reports image"

on:
  push:
    paths:
      - "reports/*/src/**"
      - "reports/*/Cargo.toml"
      - "reports/Cargo.toml"
      - "reports/Dockerfile"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          cd reports
          docker compose build
          docker compose push

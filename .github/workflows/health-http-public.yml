# │  DO NOT EDIT — this file is generated/deployed by the engine  │
# │                                                                │
# │  Source: cloud/workflows/src/  (templates + static)            │
# │  Build:  ./build.sh workflow   (generates → workflows/dist/)   │
# │  Deploy: copies dist/ → .github/workflows/                    │
# │                                                                │
# │  Edit the source, run build.sh workflow, then commit.          │
# └──────────────────────────────────────────────────────────────┘

name: "Health → HTTP public"

on:
  workflow_run:
    workflows:
      - "Ship → gcp-proxy"
      - "Ship → oci-apps"
      - "Ship → oci-mail"
      - "Ship → oci-analytics"
      - "Ship → gcp-t4"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: health-http-public
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        env:
          OIDC_TOKEN: ${{ secrets.AUTHELIA_OIDC_BEARER_TOKEN }}
        run: bash .github/workflows/scripts/health-http-public.sh

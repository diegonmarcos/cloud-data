<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C3 Cloud Data</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
  <h1>C3 Cloud Data</h1>
  <nav id="nav"></nav>
  <div class="meta" id="meta">Loading...</div>
</div>

<div id="main">
  <div class="loading">Loading manifest...</div>
</div>

<script>
const REFRESH_MS = 300000; // 5 min
let manifest = [];
let currentPage = null;

// ── Boot ──
async function init() {
  try {
    const res = await fetch('manifest.json?t=' + Date.now());
    manifest = await res.json();
  } catch (e) {
    document.getElementById('main').innerHTML = '<div class="error">Failed to load manifest.json</div>';
    return;
  }

  buildSidebar();
  window.addEventListener('hashchange', onHashChange);
  onHashChange();
  setInterval(() => loadPage(currentPage, true), REFRESH_MS);
}

// ── Sidebar ──
function buildSidebar() {
  const nav = document.getElementById('nav');
  nav.innerHTML = manifest.map(p =>
    '<a href="#' + slug(p.file) + '">' + p.name + '</a>'
  ).join('');
}

function slug(file) {
  return file.replace('.json', '');
}

function setActive(file) {
  document.querySelectorAll('#nav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + slug(file));
  });
}

// ── Routing ──
function onHashChange() {
  const hash = location.hash.slice(1);
  const page = manifest.find(p => slug(p.file) === hash);
  if (page) {
    loadPage(page);
  } else if (manifest.length) {
    location.hash = '#' + slug(manifest[0].file);
  }
}

// ── Load + Render ──
async function loadPage(page, silent) {
  if (!page) return;
  currentPage = page;
  setActive(page.file);
  const main = document.getElementById('main');

  if (!silent) main.innerHTML = '<div class="loading">Loading ' + page.name + '...</div>';

  try {
    const res = await fetch(page.file + '?t=' + Date.now());
    const data = await res.json();
    main.innerHTML = '';

    const h2 = document.createElement('h2');
    h2.textContent = page.name;
    main.appendChild(h2);

    renderData(main, data);
    document.getElementById('meta').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    if (!silent) main.innerHTML = '<div class="error">Failed to load ' + page.file + '</div>';
  }
}

// ── Smart Renderer ──
function renderData(container, data) {
  if (Array.isArray(data)) {
    container.appendChild(renderArrayTable(data));
  } else if (typeof data === 'object' && data !== null) {
    renderObjectSections(container, data);
  } else {
    container.appendChild(document.createTextNode(String(data)));
  }
}

// ── Array of objects → table ──
function renderArrayTable(arr) {
  if (!arr.length) return document.createTextNode('(empty)');

  // If array of primitives
  if (typeof arr[0] !== 'object') {
    const ul = document.createElement('div');
    ul.className = 'val-array';
    ul.textContent = arr.join(', ');
    return ul;
  }

  const keys = [...new Set(arr.flatMap(obj => Object.keys(obj)))];
  // Skip _meta keys
  const cols = keys.filter(k => k !== '_meta');

  const table = document.createElement('table');

  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  cols.forEach(k => {
    const th = document.createElement('th');
    th.textContent = prettyKey(k);
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  arr.forEach(obj => {
    const tr = document.createElement('tr');
    cols.forEach(k => {
      const td = document.createElement('td');
      td.appendChild(renderValue(obj[k]));
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  return table;
}

// ── Object → sections by top-level key ──
function renderObjectSections(container, obj) {
  for (const [key, val] of Object.entries(obj)) {
    if (key === '_meta') {
      renderMeta(container, val);
      continue;
    }

    const section = document.createElement('div');
    section.className = 'section';

    const h3 = document.createElement('h3');
    h3.textContent = prettyKey(key);
    section.appendChild(h3);

    if (Array.isArray(val)) {
      section.appendChild(renderArrayTable(val));
    } else if (typeof val === 'object' && val !== null) {
      // Object of objects → cards (like VMs)
      const subKeys = Object.keys(val);
      if (subKeys.length && typeof val[subKeys[0]] === 'object' && !Array.isArray(val[subKeys[0]])) {
        subKeys.forEach(sk => {
          const card = document.createElement('div');
          card.className = 'card';
          const h4 = document.createElement('h4');
          h4.textContent = sk;
          card.appendChild(h4);
          card.appendChild(renderKVTable(val[sk]));
          section.appendChild(card);
        });
      } else {
        section.appendChild(renderKVTable(val));
      }
    } else {
      const p = document.createElement('p');
      p.appendChild(renderValue(val));
      section.appendChild(p);
    }

    container.appendChild(section);
  }
}

// ── Key-value table (single object) ──
function renderKVTable(obj) {
  const table = document.createElement('table');
  const tbody = document.createElement('tbody');

  for (const [k, v] of Object.entries(obj)) {
    const tr = document.createElement('tr');
    const th = document.createElement('td');
    th.innerHTML = '<strong>' + escHtml(prettyKey(k)) + '</strong>';
    tr.appendChild(th);
    const td = document.createElement('td');
    td.appendChild(renderValue(v));
    tr.appendChild(td);
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  return table;
}

// ── Render a single value ──
function renderValue(val) {
  const span = document.createElement('span');

  if (val === null || val === undefined) {
    span.className = 'val-null';
    span.textContent = '—';
  } else if (typeof val === 'boolean') {
    span.className = val ? 'val-bool-true' : 'val-bool-false';
    span.textContent = String(val);
  } else if (typeof val === 'number') {
    span.className = 'val-number';
    span.textContent = String(val);
  } else if (Array.isArray(val)) {
    if (!val.length) {
      span.className = 'val-null';
      span.textContent = '—';
    } else if (typeof val[0] === 'object') {
      return renderArrayTable(val);
    } else {
      span.className = 'val-array';
      span.textContent = val.join(', ');
    }
  } else if (typeof val === 'object') {
    span.className = 'val-object';
    span.textContent = JSON.stringify(val);
  } else {
    span.textContent = String(val);
  }

  return span;
}

// ── _meta block ──
function renderMeta(container, meta) {
  const div = document.createElement('div');
  div.className = 'section';
  div.style.opacity = '0.6';
  div.style.fontSize = '11px';
  const parts = Object.entries(meta).map(([k, v]) => prettyKey(k) + ': ' + v);
  div.textContent = parts.join(' | ');
  container.appendChild(div);
}

// ── Helpers ──
function prettyKey(k) {
  return k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

init();
</script>
</body>
</html>

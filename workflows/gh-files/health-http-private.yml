name: "Health → HTTP private (.app)"

on:
  workflow_run:
    workflows:
      - "Deploy → gcp-proxy"
      - "Deploy → oci-apps"
      - "Deploy → oci-mail"
      - "Deploy → oci-analytics"
      - "Deploy → gcp-t4"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: health-http-private
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.GCP_PROXY_SSH_KEY }}
          ssh_host: ${{ secrets.GCP_PROXY_HOST }}
          ssh_user: ${{ secrets.GCP_PROXY_USER }}
          ssh_alias: gcp-proxy
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Check all .app DNS (single SSH, batch dig)
        run: |
          DNS_FILE="cloud-data/cloud-data-dns-services.json"
          [ ! -f "$DNS_FILE" ] || [ ! -s "$DNS_FILE" ] && echo "::error::$DNS_FILE missing" && exit 1

          # Build batch dig script — single SSH call resolves ALL names
          NAMES=$(jq -r '.services | keys[]' "$DNS_FILE" | sort)
          SCRIPT=""
          for name in $NAMES; do
            SCRIPT="$SCRIPT echo \"==$name==\"; dig +short ${name}.app @10.0.0.1 2>/dev/null | head -1;"
          done

          echo "=== Resolving $(echo "$NAMES" | wc -w) .app names via single SSH ==="
          BATCH_RESULT=$(ssh gcp-proxy "$SCRIPT" 2>/dev/null)

          # Parse results + compare with expected IPs
          RESULTS="/tmp/dns-results.txt"
          > "$RESULTS"
          CURRENT_NAME=""

          echo "$BATCH_RESULT" | while read -r line; do
            if echo "$line" | grep -q "^==.*==$"; then
              CURRENT_NAME=$(echo "$line" | awk -F'==' '{print $2}')
            elif [ -n "$CURRENT_NAME" ]; then
              RESOLVED="$line"
              EXPECTED=$(jq -r ".services[\"$CURRENT_NAME\"].ip // \"\"" "$DNS_FILE")
              if [ -z "$RESOLVED" ]; then
                echo "WARN|${CURRENT_NAME}.app|no zone" >> "$RESULTS"
              elif [ "$RESOLVED" = "$EXPECTED" ]; then
                echo "PASS|${CURRENT_NAME}.app|$RESOLVED" >> "$RESULTS"
              else
                echo "FAIL|${CURRENT_NAME}.app|expected=$EXPECTED got=$RESOLVED" >> "$RESULTS"
              fi
              CURRENT_NAME=""
            fi
          done

          # Also batch-test VM reachability (SSH port 22 on each unique IP)
          UNIQUE_IPS=$(jq -r '[.services[].ip] | unique[]' "$DNS_FILE")
          for ip in $UNIQUE_IPS; do
            (
              if ssh gcp-proxy "timeout 2 bash -c 'echo > /dev/tcp/$ip/22' 2>/dev/null"; then
                echo "PASS|VM $ip|reachable" >> "$RESULTS"
              else
                echo "WARN|VM $ip|unreachable" >> "$RESULTS"
              fi
            ) &
          done
          wait

          # Report
          echo ""
          echo "════════════════════════════════════════"
          PASS_N=$(grep -c "^PASS" "$RESULTS" 2>/dev/null || echo 0)
          FAIL_N=$(grep -c "^FAIL" "$RESULTS" 2>/dev/null || echo 0)
          WARN_N=$(grep -c "^WARN" "$RESULTS" 2>/dev/null || echo 0)

          grep "^PASS" "$RESULTS" | awk -F'|' '{print "✓ " $2 " → " $3}'
          grep "^WARN" "$RESULTS" | awk -F'|' '{print "⚠ " $2 " — " $3}'
          grep "^FAIL" "$RESULTS" | awk -F'|' '{print "::error::" $2 " — " $3}'

          echo ""
          echo "RESULT: $PASS_N passed, $FAIL_N failed, $WARN_N warnings"
          [ "$FAIL_N" -gt 0 ] && exit 1
          echo "All .app DNS entries correct"

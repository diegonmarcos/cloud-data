name: "Health в†’ HTTP public"

on:
  workflow_run:
    workflows:
      - "Deploy в†’ gcp-proxy"
      - "Deploy в†’ oci-apps"
      - "Deploy в†’ oci-mail"
      - "Deploy в†’ oci-analytics"
      - "Deploy в†’ gcp-t4"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: health-http-public
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build URL list from Caddy routes
        id: urls
        run: |
          R="a_solutions/bb-sec_caddy/src/cloud-data-caddy-routes.json"
          [ ! -f "$R" ] && echo "::error::$R not found" && exit 1
          URLS="/tmp/urls.txt"
          > "$URLS"

          # Subdomain routes
          jq -r '.routes[] | "https://\(.domain)/|\(.auth // "two_factor")|\(.comment // .domain)"' "$R" >> "$URLS"
          # Path routes
          jq -r '.path_routes[]? | .parent_domain as $p | .paths[]? | "https://\($p)\(.base_path)/|\(.auth // "two_factor")|\(.comment // .base_path)"' "$R" >> "$URLS"
          # GitHub Pages
          jq -r '.github_pages_proxies[]? | "https://\(.domain | split(",") | .[0] | gsub("^ +| +$";""))/|none|\(.comment // .domain)"' "$R" >> "$URLS"
          # MCP (expect 400 = alive)
          jq -r '.mcp_routes[]? | .parent_domain as $p | .endpoints[]? | "https://\($p)\(.base_path)/mcp|mcp|\(.comment // .base_path)"' "$R" >> "$URLS"
          # Special
          jq -r '.special | to_entries[]? | select(.value.domain) | "https://\(.value.domain)/|two_factor|\(.key)"' "$R" >> "$URLS"

          echo "total=$(wc -l < "$URLS")" >> "$GITHUB_OUTPUT"
          echo "Generated $(wc -l < "$URLS") URLs to check"

      - name: Check all URLs (async)
        env:
          OIDC_TOKEN: ${{ secrets.AUTHELIA_OIDC_BEARER_TOKEN }}
        run: |
          URLS="/tmp/urls.txt"
          RESULTS="/tmp/results"
          mkdir -p "$RESULTS"

          check() {
            local idx="$1" url="$2" auth="$3" name="$4"
            local hdr=""
            [ "$auth" != "none" ] && [ "$auth" != "public" ] && [ "$auth" != "mcp" ] && [ -n "$OIDC_TOKEN" ] && hdr="-H 'Authorization: Bearer $OIDC_TOKEN'"
            local code
            code=$(eval curl -sk -o /dev/null -w '%{http_code}' --max-time 10 --location-trusted $hdr "'$url'" 2>/dev/null)

            if [ "$auth" = "mcp" ]; then
              # MCP: 400/405 = alive
              if [ "$code" = "400" ] || [ "$code" = "405" ] || [ "$code" = "406" ]; then
                echo "PASS|$name|$url|$code" > "$RESULTS/$idx"
              else
                echo "FAIL|$name|$url|$code" > "$RESULTS/$idx"
              fi
            elif [ "$code" = "000" ]; then
              echo "FAIL|$name|$url|TIMEOUT" > "$RESULTS/$idx"
            elif [ "$code" = "502" ] || [ "$code" = "503" ]; then
              echo "FAIL|$name|$url|$code" > "$RESULTS/$idx"
            elif [ "$code" = "401" ] || [ "$code" = "403" ]; then
              # ntfy uses its own auth (JWT/tk_/cookie) вЂ” 401 means it's alive and serving its login
              if [ "$name" = "ntfy" ] && [ "$code" = "401" ]; then
                echo "PASS|$name|$url|$code (own auth)" > "$RESULTS/$idx"
              else
                echo "WARN|$name|$url|$code" > "$RESULTS/$idx"
              fi
            else
              echo "PASS|$name|$url|$code" > "$RESULTS/$idx"
            fi
          }

          # Launch ALL checks in parallel
          IDX=0
          while IFS='|' read -r url auth name; do
            check "$IDX" "$url" "$auth" "$name" &
            IDX=$((IDX + 1))
          done < "$URLS"

          # Wait for all
          wait

          # Also check L4 TCP ports in parallel
          jq -r '.l4_routes[]? | "\(.port)|\(.comment // "port")"' "a_solutions/bb-sec_caddy/src/cloud-data-caddy-routes.json" | while IFS='|' read -r port comment; do
            (
              if timeout 3 bash -c "echo > /dev/tcp/mail.diegonmarcos.com/$port" 2>/dev/null; then
                echo "PASS|L4 :$port $comment|tcp://$port|OK" > "$RESULTS/l4_$port"
              else
                echo "FAIL|L4 :$port $comment|tcp://$port|CLOSED" > "$RESULTS/l4_$port"
              fi
            ) &
          done
          wait

          # Collect results
          echo ""
          echo "в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ"
          PASS_N=0; FAIL_N=0; WARN_N=0
          for f in "$RESULTS"/*; do
            [ -f "$f" ] || continue
            LINE=$(cat "$f")
            STATUS=$(echo "$LINE" | awk -F'|' '{print $1}')
            NAME=$(echo "$LINE" | awk -F'|' '{print $2}')
            URL=$(echo "$LINE" | awk -F'|' '{print $3}')
            CODE=$(echo "$LINE" | awk -F'|' '{print $4}')
            case "$STATUS" in
              PASS) echo "вњ“ $NAME вЂ” $URL вЂ” $CODE"; PASS_N=$((PASS_N + 1)) ;;
              FAIL) echo "::error::$NAME вЂ” $URL вЂ” $CODE"; FAIL_N=$((FAIL_N + 1)) ;;
              WARN) echo "::warning::$NAME вЂ” $URL вЂ” $CODE"; WARN_N=$((WARN_N + 1)) ;;
            esac
          done

          echo ""
          echo "RESULT: $PASS_N passed, $FAIL_N failed, $WARN_N warnings"
          if [ "$FAIL_N" -gt 0 ]; then
            echo "::error::$FAIL_N URL(s) failed"
            exit 1
          fi
          echo "All public URLs healthy"

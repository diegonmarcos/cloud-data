name: "Build → GHCR images"

on:
  push:
    paths:
      - "a_solutions/aa-sui_google-workspace-mcp/src/**"
      - "a_solutions/aa-sui_mail-mcp/src/**"
      - "a_solutions/aa-sui_mattermost-mcp/src/**"
      - "a_solutions/bb-sec_introspect-proxy/src/**"
      - "a_solutions/bc-obs_c3-infra-mcp-api/src/**"
      - "a_solutions/bc-obs_c3-services-mcp-api/src/**"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: google-workspace-mcp
            context: a_solutions/aa-sui_google-workspace-mcp/src
            file: a_solutions/aa-sui_google-workspace-mcp/src/Dockerfile
          - name: mail-mcp
            context: a_solutions/aa-sui_mail-mcp/src
            file: a_solutions/aa-sui_mail-mcp/src/Dockerfile
          - name: mattermost-mcp
            context: a_solutions/aa-sui_mattermost-mcp/src
            file: a_solutions/aa-sui_mattermost-mcp/src/Dockerfile
          - name: introspect-proxy
            context: a_solutions/bb-sec_introspect-proxy/src
            file: a_solutions/bb-sec_introspect-proxy/src/Dockerfile
          - name: c3-infra-mcp-api
            context: a_solutions/bc-obs_c3-infra-mcp-api/src
            file: a_solutions/bc-obs_c3-infra-mcp-api/src/Dockerfile
          - name: c3-services-mcp-api
            context: a_solutions/bc-obs_c3-services-mcp-api/src
            file: a_solutions/bc-obs_c3-services-mcp-api/src/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/diegonmarcos/${{ matrix.name }}:latest
            ghcr.io/diegonmarcos/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

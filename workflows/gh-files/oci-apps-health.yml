name: "Health → oci-apps"

on:
  workflow_run:
    workflows: ["Deploy → oci-apps"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: health-oci-apps
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.OCI_SSH_KEY }}
          ssh_host: 82.70.229.129
          ssh_user: ubuntu
          ssh_alias: oci-apps
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Check all containers
        run: |
          echo "=== oci-apps container health ==="
          ssh oci-apps 'docker ps --format "{{.Names}}\t{{.Status}}" 2>&1' | tee /tmp/containers.txt

          failed=0
          while IFS=$'\t' read -r name status; do
            if echo "$status" | grep -qiE "Restarting|unhealthy|Exited"; then
              echo "::error::$name — $status"
              ssh oci-apps "docker logs $name --tail 10 2>&1" || true
              failed=$((failed + 1))
            else
              echo "✓ $name — $status"
            fi
          done < /tmp/containers.txt

          echo ""
          echo "=== Port checks ==="
          for port in 3100 3101 3102 3103 8065 8081; do
            if ssh oci-apps "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/$port' 2>/dev/null"; then
              echo "✓ :$port open"
            else
              echo "✗ :$port closed"
            fi
          done

          echo ""
          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed container(s) unhealthy"
            echo ""
            echo "=== Debug dump ==="
            ssh oci-apps 'free -m; echo "---"; uptime; echo "---"; df -h / 2>/dev/null' || true
            exit 1
          fi
          echo "All containers healthy"

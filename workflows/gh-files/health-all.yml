name: "Health → all VMs"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC

permissions:
  actions: write
  contents: read

jobs:
  vms:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vm: [gcp-proxy, gcp-t4, oci-apps, oci-analytics, oci-mail]
    steps:
      - name: Trigger ${{ matrix.vm }} health check
        run: gh workflow run "${{ matrix.vm }}-health.yml" --repo "${{ github.repository }}" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  http-public:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger HTTP public health check
        run: gh workflow run "health-http-public.yml" --repo "${{ github.repository }}" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  http-private:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger HTTP private (.app) health check
        run: gh workflow run "health-http-private.yml" --repo "${{ github.repository }}" --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

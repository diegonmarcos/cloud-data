name: "Health → gcp-proxy"

on:
  workflow_run:
    workflows: ["Ship → gcp-proxy"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: health-gcp-proxy
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.GCP_PROXY_SSH_KEY }}
          ssh_host: ${{ secrets.GCP_PROXY_HOST }}
          ssh_user: ${{ secrets.GCP_PROXY_USER }}
          ssh_alias: gcp-proxy
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        run: bash .github/workflows/scripts/health-check-vm.sh gcp-proxy 53,80,443,8090,9091

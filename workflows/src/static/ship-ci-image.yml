name: "Ship → CI image"

on:
  push:
    paths:
      - "workflows/src/cloud-builder/**"
      - "config.json"
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-image-build
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/diegonmarcos/cloud-builder-x-deb-nixhm

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Encode Dockerfile for label
        id: dockerfile
        run: echo "b64=$(base64 -w0 workflows/src/cloud-builder/docker/Dockerfile)" >> "$GITHUB_OUTPUT"

      - name: Build and push cloud-builder image
        uses: docker/build-push-action@v6
        with:
          context: workflows/src/cloud-builder
          file: workflows/src/cloud-builder/docker/Dockerfile
          push: true
          build-args: |
            DOCKERFILE_B64=${{ steps.dockerfile.outputs.b64 }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

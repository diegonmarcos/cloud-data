name: "Health → oci-analytics"

on:
  workflow_run:
    workflows: ["Ship → oci-analytics"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: health-oci-analytics
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.OCI_SSH_KEY }}
          ssh_host: 129.151.228.66
          ssh_user: ubuntu
          ssh_alias: oci-analytics
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        run: bash .github/workflows/scripts/health-check-vm.sh oci-analytics 8080 windmill-worker,alerts-api

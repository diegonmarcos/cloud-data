name: "Setup Dependencies"
description: "Pull cloud-builder image + setup SSH/SOPS — all builds run inside container"

inputs:
  ssh_key:
    description: "SSH private key for target VM"
    required: false
  ssh_host:
    description: "SSH host IP/hostname"
    required: false
  ssh_user:
    description: "SSH username"
    required: false
    default: "ubuntu"
  ssh_alias:
    description: "SSH config Host alias (e.g. oci-apps, gcp-proxy)"
    required: false
  sops_age_key:
    description: "SOPS age private key"
    required: false

runs:
  using: "composite"
  steps:
    - name: Pull cloud-builder image
      shell: bash
      run: |
        CI_IMAGE="ghcr.io/diegonmarcos/cloud-builder-x-deb-nixhm:latest"
        if docker pull "$CI_IMAGE" 2>/dev/null; then
          echo "CLOUD_CI_IMAGE=$CI_IMAGE" >> "$GITHUB_ENV"
          echo "Pulled cloud-builder image — all builds run inside this container"
        else
          echo "::error::cloud-builder image not available — cannot build"
          exit 1
        fi

    - name: Setup SSH
      if: inputs.ssh_key != ''
      shell: bash
      run: |
        mkdir -p ~/.ssh/sockets
        chmod 700 ~/.ssh
        echo "${{ inputs.ssh_key }}" > ~/.ssh/id_deploy
        chmod 600 ~/.ssh/id_deploy
        cat > ~/.ssh/config <<EOF
        Host ${{ inputs.ssh_alias }}
          HostName ${{ inputs.ssh_host }}
          User ${{ inputs.ssh_user }}
          IdentityFile ~/.ssh/id_deploy
          StrictHostKeyChecking no
          ServerAliveInterval 30
          ServerAliveCountMax 10
        EOF
        chmod 600 ~/.ssh/config

    - name: Setup SOPS age key
      if: inputs.sops_age_key != ''
      shell: bash
      run: |
        mkdir -p ~/.config/sops/age
        echo "${{ inputs.sops_age_key }}" > ~/.config/sops/age/keys.txt
        echo "SOPS_AGE_KEY_FILE=$HOME/.config/sops/age/keys.txt" >> "$GITHUB_ENV"

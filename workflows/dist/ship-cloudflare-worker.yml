# ┌──────────────────────────────────────────────────────────────┐
# │  DO NOT EDIT — this file is generated/deployed by the engine  │
# │                                                                │
# │  Source: cloud/workflows/src/  (templates + static)            │
# │  Build:  ./build.sh workflow   (generates → workflows/dist/)   │
# │  Deploy: copies dist/ → .github/workflows/                    │
# │                                                                │
# │  Edit the source, run build.sh workflow, then commit.          │
# └──────────────────────────────────────────────────────────────┘

name: "Ship → cloudflare-worker"

on:
  push:
    paths:
      - "a_solutions/ba-clo_cloudflare-worker/src/**"
      - ".github/workflows/ship-cloudflare-worker.yml"
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ship-cloudflare-worker
  cancel-in-progress: false

jobs:
  ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: bash .github/workflows/scripts/ship-cloudflare-worker.sh

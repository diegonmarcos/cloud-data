# │  DO NOT EDIT — this file is generated/deployed by the engine  │
# │                                                                │
# │  Source: cloud/workflows/src/  (templates + static)            │
# │  Build:  ./build.sh workflow   (generates → workflows/dist/)   │
# │  Deploy: copies dist/ → .github/workflows/                    │
# │                                                                │
# │  Edit the source, run build.sh workflow, then commit.          │
# └──────────────────────────────────────────────────────────────┘

name: "Ship → home-manager"

on:
  workflow_dispatch:
    inputs:
      vm:
        description: "Target VM (gcp-proxy, gcp-t4, oci-mail, oci-analytics, oci-apps, oci-apps-2, or empty for all)"
        required: false
        type: string

concurrency:
  group: home-manager-deploy
  cancel-in-progress: false

jobs:
  deploy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - vm: gcp-proxy
            host_secret: GCP_PROXY_HOST
            user_secret: GCP_PROXY_USER
            key_secret: GCP_PROXY_SSH_KEY
          - vm: gcp-t4
            host_secret: GCP_T4_HOST
            user_secret: GCP_T4_USER
            key_secret: GCP_T4_SSH_KEY
            optional: true
          - vm: oci-mail
            host: "130.110.251.193"
            user: "ubuntu"
            key_secret: OCI_SSH_KEY
          - vm: oci-analytics
            host: "129.151.228.66"
            user: "ubuntu"
            key_secret: OCI_SSH_KEY
          - vm: oci-apps
            host: "82.70.229.129"
            user: "ubuntu"
            key_secret: OCI_SSH_KEY

    runs-on: ubuntu-latest
    name: ${{ matrix.vm }}
    continue-on-error: ${{ matrix.optional || false }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Check if should run
        id: gate
        run: |
          EVENT="${{ github.event_name }}"
          TARGET="${{ inputs.vm }}"
          VM="${{ matrix.vm }}"
          if [ "$EVENT" != "workflow_dispatch" ] || [ -z "$TARGET" ] || [ "$TARGET" = "$VM" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping $VM (target: $TARGET)"
          fi

      - name: Resolve host/user
        if: steps.gate.outputs.skip != 'true'
        id: resolve
        run: |
          HOST="${{ matrix.host }}"
          USER="${{ matrix.user }}"
          [ -z "$HOST" ] && HOST="${{ secrets[matrix.host_secret] }}"
          [ -z "$USER" ] && USER="${{ secrets[matrix.user_secret] }}"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "user=$USER" >> "$GITHUB_OUTPUT"

      - name: Ship inside cloud-builder
        if: steps.gate.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull ghcr.io/diegonmarcos/cloud-builder-x86-nixos:latest
          docker run --rm \
            -e SSH_KEY='${{ secrets[matrix.key_secret] }}' \
            -e SSH_HOST='${{ steps.resolve.outputs.host }}' \
            -e SSH_USER='${{ steps.resolve.outputs.user }}' \
            -e SSH_ALIAS='${{ matrix.vm }}' \
            -e SOPS_AGE_KEY='${{ secrets.SOPS_AGE_KEY }}' \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SHA="${{ github.sha }}" \
            ghcr.io/diegonmarcos/cloud-builder-x86-nixos:latest \
            bash -c '
              # Setup SSH
              mkdir -p ~/.ssh/sockets
              echo "$SSH_KEY" > ~/.ssh/id_deploy
              chmod 600 ~/.ssh/id_deploy
              cat > ~/.ssh/config <<SSHEOF
          Host $SSH_ALIAS
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ServerAliveInterval 30
            ServerAliveCountMax 10
          SSHEOF
              chmod 600 ~/.ssh/config
              # Setup SOPS
              mkdir -p ~/.config/sops/age
              echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
              export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt
              # Clone and ship
              ssh-keyscan github.com >>~/.ssh/known_hosts 2>/dev/null
              git clone --depth 2 --recurse-submodules https://github.com/$GITHUB_REPOSITORY.git /workspace
              cd /workspace
              git submodule update --remote
              bash .github/workflows/scripts/ship-home-manager.sh "$SSH_ALIAS"
            '

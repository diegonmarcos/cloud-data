name: "Health → HTTP private (.app)"

on:
  workflow_run:
    workflows:
      - "Ship → gcp-proxy"
      - "Ship → oci-apps"
      - "Ship → oci-mail"
      - "Ship → oci-analytics"
      - "Ship → gcp-t4"
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: health-http-private
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps
        with:
          ssh_key: ${{ secrets.GCP_PROXY_SSH_KEY }}
          ssh_host: ${{ secrets.GCP_PROXY_HOST }}
          ssh_user: ${{ secrets.GCP_PROXY_USER }}
          ssh_alias: gcp-proxy
          sops_age_key: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run
        shell: bash {0}
        run: bash .github/workflows/scripts/health-http-private.sh

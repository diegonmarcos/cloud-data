name: "Ship → GHCR images"

on:
  push:
    paths:
      - "a_solutions/bc-obs_c3-infra-api/src/**"
      - "a_solutions/bc-obs_c3-infra-mcp/src/**"
      - "a_solutions/bc-obs_c3-services-api/src/**"
      - "a_solutions/bc-obs_c3-services-mcp/src/**"
      - "a_solutions/bc-obs_cloud-cgc-mcp/src/**"
      - "a_solutions/aa-sui_google-workspace-mcp/src/**"
      - "a_solutions/bb-sec_introspect-proxy/src/**"
      - "a_solutions/aa-sui_mail-mcp/src/**"
      - "a_solutions/aa-sui_mattermost-mcp/src/**"
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules to latest
        run: git submodule update --remote

      - uses: ./.github/actions/setup-deps

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: bash .github/workflows/scripts/ship-ghcr.sh
